{% extends "base.html" %}

{% block title %}{{ page.title }} – {{ config.title }}{% endblock title %}

{% block content %}
<article>
  <h1>{{ page.title }}</h1>
  {% if page.date %}
    <p class="subtitle">{{ page.date | date(format="%B %e, %Y") }}</p>
  {% endif %}
  <section>
    {{ page.content | safe }}
  </section>
</article>
{% endblock content %}
